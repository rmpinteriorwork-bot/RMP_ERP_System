<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMP INTERIOR - ERP System</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>RMP INTERIOR</h2>
                <p>Built with Vision. Designed with Care.</p>
            </div>
            <nav class="sidebar-nav" id="navMenu">
                </nav>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div class="topbar-left">
                    <button id="mobileMenuBtn" class="icon-btn"><i class="fas fa-bars"></i></button>
                    <h2 id="pageTitle">Executive Dashboard</h2>
                </div>
                <div class="topbar-right">
                    <button id="themeToggle" class="icon-btn"><i class="fas fa-moon"></i></button>
                </div>
            </header>
            
            <div class="content-container" id="moduleContainer">
                </div>
        </main>
    </div>

    <div id="globalModal" class="modal-overlay">
        <div class="modal-content" id="modalBody"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
